<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>local research</title>
<style>
  :root{
    --bg:#f7f7f6; --panel:#ffffff; --ink:#1c1c1a; --dim:#6b6b66; --line:#e4e4e0;
    --accent:#2f6f4f; --accent-ink:#fff; --chip:#eef2f0; --link:#1e6f8c; --warn:#9a6b1a;
    --user:#eef3f7;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#17181a; --panel:#1f2124; --ink:#e9e9e6; --dim:#9a9a94; --line:#31343a;
      --accent:#4a9d74; --accent-ink:#0c0f0d; --chip:#26292e; --link:#6fc0dc; --warn:#d0a24f;
      --user:#232a31;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);
       font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,sans-serif;
       display:flex;flex-direction:column}
  header{display:flex;gap:10px;align-items:center;padding:10px 14px;
         border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap}
  header .title{font-weight:600;margin-right:auto}
  header .title small{color:var(--dim);font-weight:400}
  select,button{font:inherit;color:var(--ink);background:var(--panel);
                border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer}
  button.primary{background:var(--accent);color:var(--accent-ink);border-color:transparent}
  button:disabled{opacity:.5;cursor:default}
  #convo{flex:1;overflow-y:auto;padding:20px 0}
  .wrap{max-width:820px;margin:0 auto;padding:0 16px}
  .turn{margin:0 0 26px}
  .user{background:var(--user);border:1px solid var(--line);border-radius:12px;
        padding:10px 14px;white-space:pre-wrap;word-wrap:break-word}
  details.trace{margin:10px 0 0;border:1px solid var(--line);border-radius:10px;background:var(--panel)}
  details.trace>summary{cursor:pointer;padding:8px 12px;color:var(--ink);font-size:13px;
        list-style:none;display:flex;gap:8px;align-items:center}
  details.trace>summary::-webkit-details-marker{display:none}
  details.trace>summary .spin{display:inline-block}
  .tracebody{padding:6px 12px 12px;font-size:13px;color:var(--ink);
        border-top:1px solid var(--line)}
  .step{margin-top:8px}
  .steplabel{color:var(--dim);font-weight:600;font-size:12px;letter-spacing:.03em}
  .think{white-space:pre-wrap;margin:2px 0 0}
  .chip{display:inline-block;background:var(--chip);border-radius:6px;padding:1px 7px;margin:3px 4px 0 0;
        font-size:12px}
  .chip.tool{color:var(--accent)}
  .chip.warn{color:var(--warn)}
  .chip.err{color:#c0392b}
  .src a{color:var(--link);text-decoration:none;word-break:break-all}
  .src a:hover{text-decoration:underline}
  .answer{margin-top:12px}
  .answer h1,.answer h2,.answer h3{font-size:1.05em;margin:1em 0 .3em}
  .answer p{margin:.5em 0}
  .answer ul,.answer ol{margin:.4em 0 .4em 1.3em;padding:0}
  .answer code{background:var(--chip);padding:1px 5px;border-radius:5px;font-size:.9em}
  .answer pre{background:var(--chip);padding:10px;border-radius:8px;overflow-x:auto}
  .answer a{color:var(--link)}
  .answer table{border-collapse:collapse;margin:.7em 0;width:100%;font-size:.95em;
        display:block;overflow-x:auto}
  .answer th,.answer td{border:1px solid var(--line);padding:6px 9px;text-align:left;vertical-align:top}
  .answer thead th{background:var(--chip)}
  .answerbar{margin-top:6px}
  .answerbar button{padding:3px 9px;font-size:12px}
  .stream{white-space:pre-wrap}
  .draft{margin-top:8px;opacity:.72}
  .draft .steplabel{color:var(--warn)}
  footer{border-top:1px solid var(--line);background:var(--panel);padding:12px 0}
  .composer{display:flex;gap:8px;align-items:flex-end}
  textarea{flex:1;resize:none;min-height:44px;max-height:180px;font:inherit;color:var(--ink);
           background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .hint{color:var(--dim);font-size:12px;margin-top:6px;text-align:center}
  #jump{position:fixed;right:22px;bottom:104px;z-index:5;display:none;cursor:pointer;
        background:var(--accent);color:var(--accent-ink);border:none;border-radius:18px;
        padding:7px 14px;font-size:13px;box-shadow:0 2px 10px rgba(0,0,0,.28)}
  #jump.show{display:block}
</style>
</head>
<body>
  <header>
    <span class="title">local research <small>· web-capable local LLM</small></span>
    <label><small style="color:var(--dim)">model</small></label>
    <select id="model"></select>
    <button id="sayhi" title="Warm up the selected model so it's ready — no need to type hi">Say Hi!</button>
    <button id="deactivate" title="Unload the selected model from RAM to free memory">Deactivate</button>
    <select id="depth" title="How hard to work">
      <option value="0" selected>Auto</option>
      <option value="1">Quick (1 source)</option>
      <option value="5">Deep (5 sources)</option>
    </select>
    <button id="newchat">New chat</button>
  </header>

  <div id="convo"><div class="wrap" id="turns"></div></div>
  <button id="jump" title="Jump to latest">↓ latest</button>

  <footer><div class="wrap">
    <div class="composer">
      <textarea id="q" placeholder="Ask anything — parentheses, quotes, symbols all fine here."></textarea>
      <button id="send" class="primary">Send</button>
      <button id="answernow" style="display:none" title="Stop researching and answer with what it already has">Answer now</button>
      <button id="stop" style="display:none" title="Abort the run entirely">Stop</button>
    </div>
    <div class="hint" id="hint">Enter to send · Shift+Enter for a new line · everything runs locally</div>
  </div></footer>

<script>
const $ = s => document.querySelector(s);
const turns = $("#turns"), convo = $("#convo"), jump = $("#jump");
let sid = crypto.randomUUID();
let controller = null;

// ---- minimal, dependency-free markdown -> safe HTML ----
// Quotes must be escaped too: inline() builds href="..." attributes out of this
// text, and an unescaped " in a model-written URL would break out of the
// attribute and become live script (the URLs come from fetched web pages).
function esc(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function inline(s){
  s = esc(s);
  s = s.replace(/`([^`]+)`/g,"<code>$1</code>");
  s = s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g,"$1<em>$2</em>");   // italics, after bold
  s = s.replace(/(https?:\/\/[^\s<)\]]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  return s;
}
function markdown(text){
  const lines = text.split("\n"); let html="", list=null, i=0;
  const closeList=()=>{ if(list){ html+=`</${list}>`; list=null; } };
  const isSep = s => /^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)*\|?\s*$/.test(s);
  const cells = s => s.replace(/^\s*\|/,"").replace(/\|\s*$/,"").split("|").map(x=>x.trim());
  while(i < lines.length){
    const line = lines[i].replace(/\s+$/,"");
    // GFM table: a header row of pipes followed by a |---|---| separator
    if(line.includes("|") && i+1 < lines.length && isSep(lines[i+1])){
      closeList();
      html += "<table><thead><tr>" + cells(line).map(h=>`<th>${inline(h)}</th>`).join("") + "</tr></thead><tbody>";
      i += 2;
      while(i < lines.length && lines[i].includes("|") && lines[i].trim() !== ""){
        html += "<tr>" + cells(lines[i]).map(c=>`<td>${inline(c)}</td>`).join("") + "</tr>";
        i++;
      }
      html += "</tbody></table>"; continue;
    }
    let m;
    if((m=line.match(/^(#{1,3})\s+(.*)$/))){ closeList(); const n=m[1].length; html+=`<h${n}>${inline(m[2])}</h${n}>`; i++; continue; }
    if((m=line.match(/^\s*[-*]\s+(.*)$/))){ if(list!=="ul"){closeList();list="ul";html+="<ul>";} html+=`<li>${inline(m[1])}</li>`; i++; continue; }
    if((m=line.match(/^\s*\d+[.)]\s+(.*)$/))){ if(list!=="ol"){closeList();list="ol";html+="<ol>";} html+=`<li>${inline(m[1])}</li>`; i++; continue; }
    if(line.trim()===""){ closeList(); i++; continue; }
    closeList(); html+=`<p>${inline(line)}</p>`; i++;
  }
  closeList(); return html;
}

// ---- models ----
async function loadModels(){
  try{
    const r = await fetch("/api/models"); const d = await r.json();
    const sel = $("#model"); sel.innerHTML="";
    (d.models||[]).forEach(name=>{
      const o=document.createElement("option"); o.value=o.textContent=name;
      if(name===d.default) o.selected=true; sel.appendChild(o);
    });
    if(!d.models || !d.models.length){ const o=document.createElement("option"); o.textContent="(no models)"; sel.appendChild(o); }
  }catch(e){ /* offline is fine; server will error clearly on send */ }
}

// Follow the stream only while the user is parked at the bottom. As soon as they
// scroll up to read something mid-generation, stop yanking the view down; a "↓ latest"
// button appears, and scrolling back to the bottom (or clicking it) resumes following.
let stick = true, lastTop = 0;
convo.addEventListener("scroll", () => {
  const top = convo.scrollTop;
  const atBottom = top + convo.clientHeight >= convo.scrollHeight - 80;
  // Direction, not just position: the moment the user pushes the view UP we let
  // go and stop following, even if still near the bottom. We only re-follow once
  // they've come back down to the bottom. Programmatic scrolls only ever move
  // DOWN, so they can never trip the "user scrolled up" branch and yank the view.
  if(top < lastTop - 2) stick = false;
  else if(atBottom) stick = true;
  lastTop = top;
  jump.classList.toggle("show", !stick);
});
function scrollDown(){ if(stick){ convo.scrollTop = convo.scrollHeight; lastTop = convo.scrollTop; } }
function stickToBottom(){ stick = true; convo.scrollTop = convo.scrollHeight; lastTop = convo.scrollTop; jump.classList.remove("show"); }
jump.onclick = stickToBottom;

// ---- one Q/A turn ----
function newTurn(question){
  const t = document.createElement("div"); t.className="turn";
  const u = document.createElement("div"); u.className="user"; u.textContent=question;
  const trace = document.createElement("details"); trace.className="trace"; trace.open=false;
  const sum = document.createElement("summary"); sum.innerHTML='<span class="spin">◐</span> thinking…';
  const body = document.createElement("div"); body.className="tracebody";
  trace.appendChild(sum); trace.appendChild(body);
  const ans = document.createElement("div"); ans.className="answer";
  const stream = document.createElement("div"); stream.className="stream"; ans.appendChild(stream);
  t.appendChild(u); t.appendChild(trace); t.appendChild(ans);
  turns.appendChild(t); scrollDown();
  return {t, trace, sum, body, ans, stream,
          stepEl:null, thinkEl:null, srcEl:null, stepBuf:"", loadTimer:null,
          answering:false, ansLive:null};
}

function setStatus(ctx, label){   // live one-line status shown while the model works
  if(!ctx.answering) ctx.sum.innerHTML = '<span class="spin">◐</span> ' + label;
}
function setDone(ctx, ok=true){
  ctx.sum.innerHTML = ok ? "✓ reasoning &amp; sources (click to expand)" : "✗ trace";
  ctx.trace.open = false;
}

// An interim answer that turned out to be a lead-in to more research must NOT be
// destroyed — the model may have written good, correct prose before deciding to
// verify. Instead of deleting it, tuck the rendered draft into the trace so it's
// still on the page (collapsed), and nothing the model wrote is ever lost.
function parkDraft(ctx){
  const live = ctx.ansLive; ctx.ansLive = null;
  if(!live) return;
  if(!live.innerHTML.trim()){ live.remove(); return; }   // nothing worth keeping
  const d = document.createElement("div"); d.className = "step draft";
  d.innerHTML = '<span class="steplabel">earlier draft · revised after more research</span>';
  live.classList.add("answer");        // keep the markdown styling once moved out of .ans
  d.appendChild(live);                 // relocate the existing node (detaches it from .ans)
  (ctx.stepEl || ctx.body).appendChild(d);
}

// ---- consume the SSE stream ----
async function ask(question){
  const model = $("#model").value, depth = $("#depth").value;
  const ctx = newTurn(question);
  // Send is locked during a run, but the textarea stays enabled so the user can
  // draft the next question while the model is still answering.
  $("#send").disabled=true; $("#stop").style.display="";
  $("#answernow").style.display=""; $("#answernow").disabled=false;
  controller = new AbortController();
  let finalText = "";
  try{
    const resp = await fetch("/api/ask",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({q:question, model, depth:Number(depth), sid}),
      signal: controller.signal,
    });
    const reader = resp.body.getReader(); const dec = new TextDecoder();
    let buf="";
    while(true){
      const {value,done} = await reader.read(); if(done) break;
      buf += dec.decode(value,{stream:true});
      let i;
      while((i = buf.indexOf("\n\n")) >= 0){
        const frame = buf.slice(0,i); buf = buf.slice(i+2);
        if(!frame.startsWith("data:")) continue;
        const ev = JSON.parse(frame.slice(5).trim());
        finalText = handle(ctx, ev) ?? finalText;
        scrollDown();
      }
    }
  }catch(e){
    if(e.name!=="AbortError"){ ctx.stream.textContent = "connection error: "+e.message; }
  }finally{
    clearLoad(ctx);
    $("#send").disabled=false; $("#stop").style.display="none";
    $("#answernow").style.display="none";
    controller=null; $("#q").focus();
  }
}

function clearLoad(ctx){   // cancel the pending "loading model…" status once anything arrives
  if(ctx.loadTimer){ clearTimeout(ctx.loadTimer); ctx.loadTimer=null; }
}
function handle(ctx, ev){
  clearLoad(ctx);
  switch(ev.type){
    case "step":{
      // A prior step may have begun an answer that turned out to be more research.
      // Park that draft in the trace (don't delete it) before opening the new step.
      parkDraft(ctx);
      const s=document.createElement("div"); s.className="step";
      s.innerHTML=`<span class="steplabel">step ${ev.n}</span>`;
      const th=document.createElement("div"); th.className="think"; s.appendChild(th);
      ctx.body.appendChild(s); ctx.stepEl=s; ctx.thinkEl=th; ctx.stepBuf="";
      ctx.answering=false;
      setStatus(ctx, "thinking…");
      // On the first step, the gap before any token is usually the model loading
      // into RAM (~30s cold). Say so in the status if nothing arrives shortly.
      if(ev.n===1){
        ctx.loadTimer = setTimeout(()=>setStatus(ctx, "loading "+$("#model").value+" into memory (~30s, just once)…"), 1200);
      }
      break;
    }
    case "thinking":
      if(ctx.thinkEl) ctx.thinkEl.textContent += ev.text;
      setStatus(ctx, "thinking…"); break;
    case "answer_chunk":{
      ctx.stepBuf += ev.text;
      if(!ctx.answering){
        const lead = ctx.stepBuf.replace(/^\s+/,"");
        // A tool call is pure JSON starting with "{"; a real answer is prose.
        // The moment real answer text begins: fold the research trace and render
        // in the normal (bright) answer color — so there's no jump at the end.
        if(lead && lead[0] !== "{"){
          ctx.answering = true;
          setDone(ctx, true);                 // mark the trace done (stays collapsed)
          ctx.ansLive = document.createElement("div");
          ctx.ans.insertBefore(ctx.ansLive, ctx.stream);
        }
      }
      if(ctx.answering) ctx.ansLive.innerHTML = markdown(ctx.stepBuf);
      // else: still a forming tool call — not shown; the status line covers it.
      break;
    }
    case "tool_call":{
      // that streamed content was a lead-in to a tool call, not the final answer.
      // Keep whatever prose already rendered (park it in the trace), then continue.
      parkDraft(ctx);
      ctx.stepBuf=""; ctx.answering=false;
      setStatus(ctx, (ev.tool==="web_fetch"?"reading a page":"searching")+(ev.label?" · "+ev.label:"")+"…");
      const c=document.createElement("span"); c.className="chip tool";
      c.textContent = `⚙ ${ev.tool}(${ev.label||""})`;
      (ctx.stepEl||ctx.body).appendChild(c); break;
    }
    case "observation":{
      const c=document.createElement("span"); c.className="chip"+(ev.ok?"":" err");
      c.textContent = (ev.ok?"✓ ":"✗ ")+ev.preview;
      (ctx.stepEl||ctx.body).appendChild(c); break;
    }
    case "source":{
      if(!ctx.srcEl){ ctx.srcEl=document.createElement("div"); ctx.srcEl.className="src";
        ctx.srcEl.innerHTML='<span class="steplabel">sources read</span><br>'; ctx.body.appendChild(ctx.srcEl); }
      const a=document.createElement("a"); a.href=ev.url; a.target="_blank"; a.rel="noopener";
      a.textContent="• "+ev.url; a.style.display="block"; ctx.srcEl.appendChild(a); break;
    }
    case "notice":{
      const c=document.createElement("span"); c.className="chip warn"; c.textContent="⤴ "+ev.text;
      (ctx.stepEl||ctx.body).appendChild(c); break;
    }
    case "final":{
      ctx.ans.innerHTML = markdown(ev.text);
      const bar=document.createElement("div"); bar.className="answerbar";
      const b=document.createElement("button"); b.textContent="Copy";
      b.onclick=()=>{ navigator.clipboard.writeText(ev.text); b.textContent="Copied ✓";
                      setTimeout(()=>b.textContent="Copy",1200); };
      bar.appendChild(b); ctx.ans.appendChild(bar);
      setDone(ctx,true); return ev.text;
    }
    case "error":
      ctx.stream.textContent = "⚠ "+ev.text; setDone(ctx,false); break;
    case "done":
      if(ctx.sum.querySelector(".spin")) setDone(ctx,true); break;
  }
}

// ---- wiring ----
const hintEl=$("#hint"), hintDefault=hintEl.textContent; let hintTimer=null;
function flashHint(msg){
  hintEl.textContent=msg;
  clearTimeout(hintTimer); hintTimer=setTimeout(()=>hintEl.textContent=hintDefault, 2000);
}
// Shell-style command history: Up/Down cycle through prior questions.
const history=[]; let hIdx=0, draft="";
function send(){
  // While an answer is streaming, typing is free but sending is locked: wait for
  // it to finish or press Stop. The drafted text stays in the box either way.
  if(controller){ flashHint("⏳ model is still answering — wait or press Stop, your draft is kept"); return; }
  const q=$("#q").value.trim(); if(!q) return;
  if(history[history.length-1]!==q) history.push(q);  // no consecutive dupes
  hIdx=history.length; draft="";
  $("#q").value=""; $("#q").style.height="44px"; stick=true; ask(q);
}
function autosize(el){ el.style.height="44px"; el.style.height=Math.min(el.scrollHeight,180)+"px"; }
$("#send").onclick=send;
$("#stop").onclick=()=>{ if(controller) controller.abort(); };
$("#answernow").onclick=async()=>{
  if(!controller) return;
  // One shot per run: the flag is set server-side, pressing again adds nothing.
  $("#answernow").disabled=true;
  flashHint("⏩ wrapping up — it will answer with what it has at the next step");
  try{
    await fetch("/api/answer_now",{method:"POST",headers:{"Content-Type":"application/json"},
                                   body:JSON.stringify({sid})});
  }catch(e){ $("#answernow").disabled=false; }
};
$("#newchat").onclick=()=>{
  // Abort any run in flight: otherwise it keeps generating into the (now cleared)
  // page and holds Send locked until it finishes on its own.
  if(controller) controller.abort();
  sid=crypto.randomUUID(); turns.innerHTML=""; $("#q").focus(); };
$("#sayhi").onclick=()=>{ if($("#send").disabled) return; stick=true; ask("Hi"); };  // warm the model without typing
$("#deactivate").onclick=async()=>{                       // unload the model from RAM on demand
  const m=$("#model").value;
  if(!m || m==="(no models)") return;
  const btn=$("#deactivate"), old=btn.textContent;
  btn.disabled=true; btn.textContent="Unloading…";
  try{
    const r=await fetch("/api/unload",{method:"POST",
      headers:{"Content-Type":"application/json"},body:JSON.stringify({model:m})});
    btn.textContent = r.ok ? "Unloaded ✓" : "Failed";
  }catch(e){ btn.textContent="Failed"; }
  setTimeout(()=>{ btn.textContent=old; btn.disabled=false; }, 1400);
};
$("#q").addEventListener("keydown",e=>{
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); return; }
  const el=e.target, atStart=el.selectionStart===0 && el.selectionEnd===0,
        atEnd=el.selectionStart===el.value.length && el.selectionEnd===el.value.length;
  // Up recalls older questions — only when caret is at the very start, so
  // multi-line editing (moving up within text) still works normally.
  if(e.key==="ArrowUp" && atStart && history.length){
    e.preventDefault();
    if(hIdx===history.length) draft=el.value;   // stash what you were typing
    hIdx=Math.max(0,hIdx-1);
    el.value=history[hIdx]; autosize(el); el.setSelectionRange(0,0);
  } else if(e.key==="ArrowDown" && atEnd && hIdx<history.length){
    e.preventDefault();
    hIdx++;
    el.value=hIdx===history.length ? draft : history[hIdx];
    autosize(el); const n=el.value.length; el.setSelectionRange(n,n);
  }
});
$("#q").addEventListener("input",e=>{ e.target.style.height="44px";
  e.target.style.height=Math.min(e.target.scrollHeight,180)+"px"; });
document.addEventListener("keydown", e => {
  if (e.key !== "/" || e.ctrlKey || e.altKey || e.metaKey) return;
  const t = e.target;
  if (t.tagName === "TEXTAREA" || t.tagName === "INPUT" || t.isContentEditable) return;
  e.preventDefault();
  $("#q").focus();
});
loadModels(); $("#q").focus();
</script>
</body>
</html>
